<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Заявки</h2>

<a class="btn btn-success mb-3" href="/create">Новая заявка</a>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Тип</th>
<th>Модель</th>
<th>Проблема</th>
<th>Статус</th>
<th>Комментарии</th>
</tr>

{% for r in requests %}

<tr>
<td>{{r.requestID}}</td>
<td>{{r.homeTechType}}</td>
<td>{{r.homeTechModel}}</td>
<td>{{r.problemDescription}}</td>
<td>{{r.requestStatus}}</td>
<td>
<a class="btn btn-sm btn-primary"
href="/comments/{{r.requestID}}">
Открыть
</a>
</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
