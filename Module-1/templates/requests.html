<!DOCTYPE html>
<html>
<head>
<title>Панель мастера</title>
</head>

<body>

<h2>Мои заявки</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Техника</th>
<th>Модель</th>
<th>Проблема</th>
<th>Статус</th>
<th>Изменить статус</th>
<th>Добавить запчасти</th>
</tr>

{% for r in requests %}

<tr>

<td>{{ r.requestID }}</td>
<td>{{ r.homeTechType }}</td>
<td>{{ r.homeTechModel }}</td>
<td>{{ r.problemDescription }}</td>
<td>{{ r.requestStatus }}</td>

<td>

<form action="/update_status" method="post">

<input type="hidden" name="request_id" value="{{ r.requestID }}">

<select name="status">

<option>Новая заявка</option>
<option>В процессе ремонта</option>
<option>Готова к выдаче</option>

</select>

<button type="submit">Изменить</button>

</form>

</td>

<td>

<form action="/add_parts" method="post">

<input type="hidden" name="request_id" value="{{ r.requestID }}">

<input type="text" name="parts" placeholder="Запчасти">

<button type="submit">Добавить</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
