<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результаты поиска</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <div class="page-header card">
        <div>
            <p class="page-kicker">Поиск заявок</p>
            <h1>Результаты поиска</h1>
        </div>
        <a href="javascript:history.back()" class="btn-secondary" style="text-decoration:none; padding:10px 16px; border-radius:8px;">Назад</a>
    </div>

    <div class="card section-card">
        <div class="table-wrapper">
            <table class="manager-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Тип техники</th>
                    <th>Модель</th>
                    <th>Проблема</th>
                    <th>Статус</th>
                </tr>
                </thead>
                <tbody>
                {% for r in requests %}
                <tr>
                    <td>#{{ r.requestID }}</td>
                    <td>{{ r.homeTechType }}</td>
                    <td>{{ r.homeTechModel }}</td>
                    <td>{{ r.problemDescription }}</td>
                    <td>{{ r.requestStatus }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5">Ничего не найдено.</td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
