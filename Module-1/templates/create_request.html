<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if edit_request %}Редактировать заявку{% else %}Создать заявку{% endif %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>{% if edit_request %}Редактировать заявку{% else %}Создать заявку{% endif %}</h2>

    <form method="post" action="{% if edit_request %}/edit_request{% else %}/create_request{% endif %}">
        {% if edit_request %}
        <input type="hidden" name="request_id" value="{{ edit_request.requestID }}">
        {% endif %}

        <input class="form-control mt-2" name="homeTechType" placeholder="Тип техники" required value="{{ edit_request.homeTechType if edit_request else '' }}">

        <input class="form-control mt-2" name="homeTechModel" placeholder="Модель" required value="{{ edit_request.homeTechModel if edit_request else '' }}">

        <textarea class="form-control mt-2" name="problemDescription" placeholder="Описание проблемы" required>{{ edit_request.problemDescription if edit_request else '' }}</textarea>

        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-success" type="submit">{% if edit_request %}Сохранить{% else %}Создать{% endif %}</button>
            <a class="btn btn-outline-secondary" href="/client/{{ client_id }}">Назад</a>
        </div>
    </form>
</div>
</body>
</html>
