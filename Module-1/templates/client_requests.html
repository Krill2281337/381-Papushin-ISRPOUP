<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Мои заявки</title>
    <style>
        /* Дополнительные кнопки в шапке */
        .header-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .header-buttons form button {
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            font-weight: 600;
            transition: all 0.3s ease, transform 0.2s ease;
        }

        .header-buttons form button:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>

<header style="position: relative;">
    Мои заявки
    <div class="header-buttons">
        <!-- Кнопка создания новой заявки -->
        <form method="get" action="/create_request">
            <button type="submit">Создать заявку</button>
        </form>

        <!-- Кнопка выхода -->
        <form method="post" action="/logout">
            <button type="submit">Выход</button>
        </form>
    </div>
</header>

<div class="container">

    <div class="card">

        <table>
            <tr>
                <th>Тип техники</th>
                <th>Модель</th>
                <th>Описание</th>
                <th>Статус</th>
                <th>Дата начала</th>
            </tr>

            {% for r in requests %}
            <tr>
                <td>{{ r.homeTechType }}</td>
                <td>{{ r.homeTechModel }}</td>
                <td>{{ r.problemDescription }}</td>
                <td>{{ r.requestStatus }}</td>
                <td>{{ r.startDate }}</td>
            </tr>
            {% endfor %}
        </table>

    </div>

</div>

</body>
</html>
